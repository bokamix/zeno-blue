name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Create release tarball
        run: |
          tar czf zeno-release.tar.gz \
            --exclude='.git' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/src' \
            --exclude='frontend/package-lock.json' \
            --exclude='frontend/package.json' \
            --exclude='frontend/vite.config.*' \
            --exclude='frontend/postcss.config.*' \
            --exclude='frontend/tailwind.config.*' \
            --exclude='.github' \
            .

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: Automated build from main branch
          prerelease: false
          make_latest: true
          files: zeno-release.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
